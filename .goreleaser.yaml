# GoReleaser configuration for Kairos
# See https://goreleaser.com for details
version: 2

project_name: kairos

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/kairos
    binary: kairos
    ldflags:
      - -s -w
      - -X github.com/afeldman/kairos/internal/build.Version={{ .Version }}
      - -X github.com/afeldman/kairos/internal/build.Commit={{ .Commit }}
      - -X github.com/afeldman/kairos/internal/build.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64
      - goos: darwin
        goarch: amd64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: ["tar.gz"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else if eq .Os "linux" }}Linux
      {{- end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- end }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

# Software Bill of Materials
sboms:
  - artifacts: archive

snapshot:
  name_template: "{{ .Version }}-next"

release:
  prerelease: auto
  draft: false

  footer: |
    ## Installation

    ### Homebrew

    ```bash
    brew install afeldman/tap/kairos
    ```

    ### Download

    Download the archive for your platform below.

    ---
    Generated with GoReleaser.

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^refactor:"

  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([^\)]*\))?!?:\s.*$'
      order: 0

    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([^\)]*\))?!?:\s.*$'
      order: 1

    - title: "📦 Other Changes"
      order: 999

brews:
  - name: kairos

    repository:
      owner: afeldman
      name: homebrew-tap
      branch: master
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

    directory: Formula

    homepage: "https://github.com/afeldman/kairos"

    description: "Git Context Engine — understands project history to generate high-quality commit messages, tags, and changelogs using LLMs"

    license: "Apache-2.0"

    commit_author:
      name: "Anton Feldmann"
      email: "anton.feldmann@gmail.com"

    commit_msg_template: "brew formula update for {{ .ProjectName }} version {{ .Tag }}"

    test: |
      system "#{bin}/kairos", "--version"

    install: |
      bin.install "kairos"
